name: windows-check

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    env:
      DEVICE_AGENT_RUST_TARGET: x86_64-pc-windows-msvc
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        shell: pwsh
        run: python -m pip install jsonschema

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run runtime checks
        shell: pwsh
        run: python .\check_runtime.py
